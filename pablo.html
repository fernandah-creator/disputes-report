<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Repetitive Dispute Patterns - Jeeves</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:#F5F4F0;color:#1a1a18;font-size:13px;line-height:1.5}
.topbar{background:#1a1a18;padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.brand{font-size:10px;font-weight:600;letter-spacing:.13em;color:#666}
.ttitle{font-size:14px;font-weight:500;color:#fff;margin-left:12px}
.tdate{font-size:11px;color:#555}
.statsbar{background:#fff;border-bottom:1px solid #e8e4dc;padding:0 20px;display:flex}
.stat{padding:12px 20px 12px 0;display:flex;flex-direction:column;border-right:1px solid #e8e4dc;margin-right:20px}
.stat:last-child{border-right:none}
.stat-l{font-size:9px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:#888;margin-bottom:4px}
.stat-v{font-size:20px;font-weight:600}
.stat-v.warn{color:#a05c00}
.filters{background:#fff;border-bottom:1px solid #e8e4dc;padding:10px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.fl{font-size:11px;color:#888;white-space:nowrap}
.fp{background:#f5f4f0;border:1px solid #e0ddd5;border-radius:6px;padding:5px 11px;font-size:12px;color:#333;cursor:pointer;font-family:inherit}
.fp:hover{background:#eceae3}
.fp.on{background:#1a1a18;color:#fff;border-color:#1a1a18}
select.fp{padding-right:20px;appearance:none}
.fsep{width:1px;height:20px;background:#e8e4dc;flex-shrink:0}
.sw{position:relative;flex:1;min-width:180px;max-width:260px}
.sw input{width:100%;background:#f5f4f0;border:1px solid #e0ddd5;border-radius:6px;padding:6px 10px 6px 26px;font-size:12px;color:#1a1a18;outline:none;font-family:inherit}
.sw input:focus{border-color:#b4b2a9}
.sw-ico{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:11px;color:#aaa;pointer-events:none}
.rc{font-size:11px;color:#888;margin-left:auto}
.main{padding:20px 20px 60px}
.shd{font-size:9px;font-weight:600;letter-spacing:.10em;text-transform:uppercase;color:#888;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.shd::after{content:"";flex:1;height:1px;background:#e8e4dc}
.tbl{background:#fff;border:1px solid #e8e4dc;border-radius:10px;overflow:hidden;width:100%}
.thead{display:grid;grid-template-columns:1.8fr 100px 110px 110px 90px 1fr 120px;padding:10px 20px;background:#faf9f7;border-bottom:1px solid #e8e4dc;column-gap:20px}
.th{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#888;cursor:pointer;user-select:none;white-space:nowrap}
.th:hover{color:#333}
.th.sorted{color:#1a1a18}
.th.sorted::after{content:" ↓"}
.th.sorted.asc::after{content:" ↑"}
.trow{display:grid;grid-template-columns:1.8fr 100px 110px 110px 90px 1fr 120px;padding:12px 20px;border-bottom:1px solid #f0ede8;align-items:center;cursor:pointer;transition:background .1s;column-gap:20px}
.trow:last-child{border-bottom:none}
.trow:hover,.trow.exp{background:#faf9f7}
.oname{font-weight:500;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.oid{font-size:9px;color:#aaa;margin-top:2px}
.td{font-size:12px;color:#333}
.td.b{font-weight:600}
.td.m{color:#888}
.td.r{color:#791f1f;font-weight:600}
.td.g{color:#1a6b4a;font-weight:600}
.td.a{color:#7a4800;font-weight:600}
.pill{display:inline-block;font-size:9px;font-weight:700;padding:3px 8px;border-radius:10px}
.pill.high{background:#fcebeb;color:#791f1f}
.pill.watch{background:#faeeda;color:#633806}
.pill.ok{background:#eaf3de;color:#27500a}
.rtag{display:inline-block;background:#f5f4f0;border:1px solid #e0ddd5;border-radius:4px;padding:2px 7px;font-size:11px;color:#555;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle}
.pct{font-size:11px;color:#888;margin-left:4px}
.mbars{display:flex;align-items:flex-end;gap:3px;height:36px}
.mbar{width:14px;border-radius:2px 2px 0 0;background:#d3d1c7;min-height:2px}
.mbar.cur{background:#1a1a18}
.mbar.spike{background:#e24b4a}
.mbar.hl{background:#4A7FC0}
.expand-arrow{font-size:18px;color:#b4b2a9;transition:transform .2s,color .15s;display:inline-block;line-height:1}
.trow:hover .expand-arrow{color:#444}
.trow.exp .expand-arrow{transform:rotate(90deg);color:#1a1a18}
.exp-inner{padding:16px 20px;background:#fafaf8;border-bottom:1px solid #e8e4dc;display:grid;grid-template-columns:1fr 1fr;gap:24px}
.exp-h{font-size:9px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:#888;margin-bottom:10px}
.exp-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:.5px solid #f0ede8;font-size:11px;color:#555}
.exp-row:last-child{border-bottom:none}
.exp-lbl{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}
.exp-val{font-weight:600;color:#1a1a18;flex-shrink:0;margin-left:8px}
.bar-wrap{margin-top:3px;height:3px;background:#ece9e2;border-radius:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;background:#e24b4a}
.bar-fill.b{background:#4A7FC0}
.ai-box{padding:12px 14px;border-radius:8px;font-size:12px;line-height:1.6}
.ai-box.high{background:#fcebeb;border:1px solid rgba(121,31,31,.15);color:#3a1010}
.ai-box.watch{background:#faeeda;border:1px solid rgba(122,74,0,.15);color:#3a2500}
.ai-box.ok{background:#eaf3de;border:1px solid rgba(39,80,10,.15);color:#1a3008}
.ai-box.loading{background:#f5f4f0;border:1px solid #e0ddd5;color:#888;font-style:italic;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.ai-label{font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;margin-bottom:6px;opacity:.7}
.ai-rec{margin-top:10px;padding-top:10px;border-top:1px solid rgba(0,0,0,.08)}
.ai-rec-label{font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;margin-bottom:5px;opacity:.7}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;color:#888;gap:12px}
.loading-screen .spinner{width:24px;height:24px;border:2px solid #e0ddd5;border-top-color:#1a1a18;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.glossary{margin-top:20px;background:#fff;border:1px solid #e8e4dc;border-radius:10px;padding:16px 20px;display:grid;grid-template-columns:repeat(5,1fr);gap:16px}
.gl-t{font-size:12px;font-weight:500;margin-bottom:3px}
.gl-d{font-size:11px;color:#888;line-height:1.5}
.empty{text-align:center;padding:60px;color:#888}
.empty strong{display:block;font-size:15px;color:#333;margin-bottom:5px}
.updated-badge{font-size:10px;color:#888;background:#f5f4f0;border:1px solid #e0ddd5;border-radius:5px;padding:3px 8px;margin-left:10px}
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center">
    <span class="brand">JEEVES</span>
    <span class="ttitle">Repetitive dispute patterns</span>
  </div>
  <span class="tdate" id="tdate">Loading...</span>
</div>

<div class="statsbar">
  <div class="stat"><div class="stat-l">Flagged orgs</div><div class="stat-v" id="s0">-</div></div>
  <div class="stat"><div class="stat-l">Total disputes analysed</div><div class="stat-v" id="s1">-</div></div>
  <div class="stat"><div class="stat-l">Needs response now</div><div class="stat-v warn" id="s2">-</div></div>
  <div class="stat"><div class="stat-l">Data range</div><div class="stat-v" style="font-size:13px" id="s3">-</div></div>
</div>

<div class="filters">
  <span class="fl">Period</span>
  <button class="fp on" onclick="setQuick('',event)">All time</button>
  <button class="fp" onclick="setQuick('3m',event)">Last 3 months</button>
  <button class="fp" onclick="setQuick('6m',event)">Last 6 months</button>
  <div class="fsep"></div>
  <span class="fl">From</span>
  <select class="fp" id="dt-from" onchange="clearQuick();render()">
    <option value="">All time</option>
  </select>
  <span class="fl">to</span>
  <select class="fp" id="dt-to" onchange="clearQuick();render()">
    <option value="">Latest</option>
  </select>
  <div class="fsep"></div>
  <div class="sw"><span class="sw-ico">&#9906;</span><input type="text" id="q" placeholder="Search org name or ID..." oninput="render()"></div>
  <span class="rc" id="rc"></span>
</div>

<div class="main">
  <div class="shd" id="sec-hd">Loading data...</div>
  <div id="tbl-wrap">
    <div class="loading-screen">
      <div class="spinner"></div>
      <span>Loading latest dispute data...</span>
    </div>
  </div>
</div>

<script>
var DISPUTES_URL = "https://fernandah-creator.github.io/disputes-report/disputes.json";
var ORGS = [], META = {}, MONTHS_ALL = [];
var sortKey = "score", sortAsc = false, expandedId = null, aiCache = {};

var RLABELS = {
  "transaction_not_recognised":"Transaction not recognised",
  "transaction_not_authorised":"Transaction not authorised",
  "duplicate_transaction":"Duplicate transaction",
  "transaction_cancelled_still_charged":"Cancelled, still charged",
  "goods_not_received":"Goods not received",
  "service_not_as_described":"Service not as described",
  "other":"Other"
};
function rl(k){ return RLABELS[k] || k; }
function fmtP(v){ return v==null?"n/a":v.toFixed(1)+"%"; }
function escH(s){ var d=document.createElement("div"); d.appendChild(document.createTextNode(String(s||""))); return d.innerHTML; }
function trunc(s,n){ n=n||30; s=String(s||""); return s.length>n?s.slice(0,n)+"...":s; }

// --- Processa o disputes.json (formato raw do Metabase) ---
function processData(raw) {
  var months_set = new Set();
  var processed = [];

  raw.orgs.forEach(function(o) {
    // Calcula meses activos
    var active_months = o.trend.filter(function(t){ return t.cases > 0; });
    var n_months = active_months.length;
    if(n_months < 2) return; // só orgs com 2+ meses

    o.trend.forEach(function(t){ if(t.cases>0) months_set.add(t.month); });

    // Top reason
    var top_r = o.top_reasons[0] || {label:"other", count:0};
    var top_reason_pct = o.total_cases > 0 ? Math.round(top_r.count/o.total_cases*1000)/10 : 0;

    // Score de suspeita
    var suspicion = Math.round(n_months * (top_reason_pct/100) * Math.pow(o.total_cases, 0.5) * 100)/100;

    // Statuses
    var statuses = o.raw_statuses || [];
    var nr = (o.statuses||{}).needs_response || 0;
    var won = (o.statuses||{}).won || 0;

    processed.push({
      org_id:          o.org_id,
      customer:        o.customer,
      total_cases:     o.total_cases,
      total_usd:       o.total_usd,
      avg_usd:         o.avg_usd,
      win_rate:        o.win_rate,
      n_months:        n_months,
      top_reason:      top_r.label,
      top_reason_pct:  top_reason_pct,
      top_reasons:     o.top_reasons.slice(0,5),
      top_merchants:   o.top_merchants.slice(0,5),
      trend:           o.trend,
      statuses:        statuses,
      needs_response:  nr,
      won:             won,
      suspicion_score: suspicion
    });
  });

  MONTHS_ALL = Array.from(months_set).sort();
  return processed;
}

// --- Inicializa filtros de mês ---
function initMonthSelects() {
  var from = document.getElementById("dt-from");
  var to   = document.getElementById("dt-to");
  MONTHS_ALL.forEach(function(m) {
    var o1 = document.createElement("option"); o1.value=m; o1.textContent=m; from.appendChild(o1);
    var o2 = document.createElement("option"); o2.value=m; o2.textContent=m; to.appendChild(o2);
  });
}

// --- Carrega dados do GitHub Pages ---
function loadData() {
  fetch(DISPUTES_URL + "?t=" + Date.now())
    .then(function(r){ return r.json(); })
    .then(function(raw) {
      ORGS = processData(raw);
      META = {
        total_cases: raw.total_cases,
        total_orgs:  raw.total_orgs,
        generated:   raw.generated_at ? raw.generated_at.slice(0,10) : "—",
        range:       raw.months_range.from + " to " + raw.months_range.to
      };

      var totNR = ORGS.reduce(function(a,o){ return a+o.needs_response; }, 0);
      document.getElementById("s0").textContent = ORGS.length + " orgs";
      document.getElementById("s1").textContent = META.total_cases.toLocaleString();
      document.getElementById("s2").textContent = totNR;
      document.getElementById("s3").textContent = META.range.replace(" to ", " → ");
      document.getElementById("tdate").textContent = "Updated " + META.generated + " · " + META.range.replace(" to ", " → ");

      initMonthSelects();

      document.getElementById("tbl-wrap").innerHTML =
        '<div class="tbl">' +
        '<div class="thead">' +
        '<div class="th sorted" id="th-score" onclick="sort(\'score\')">Organisation</div>' +
        '<div class="th" id="th-flag" onclick="sort(\'flag\')">Risk</div>' +
        '<div class="th" id="th-months" onclick="sort(\'months\')">Months active</div>' +
        '<div class="th" id="th-cases" onclick="sort(\'cases\')">Total disputes</div>' +
        '<div class="th" id="th-wr" onclick="sort(\'wr\')">Win rate</div>' +
        '<div class="th">Top reason (% of cases)</div>' +
        '<div class="th" style="text-align:right">Details</div>' +
        '</div>' +
        '<div id="tbody"></div>' +
        '</div>' +
        '<div class="glossary">' +
        '<div><div class="gl-t">Months active</div><div class="gl-d">How many months this org opened at least one dispute. Higher = more persistent pattern.</div></div>' +
        '<div><div class="gl-t">Top reason %</div><div class="gl-d">What % of disputes use the same reason. 100% = always identical — abnormal.</div></div>' +
        '<div><div class="gl-t">Win rate</div><div class="gl-d">% of disputes confirmed as fraud by the card network. High win rate + repetitive pattern = network is validating the fraud.</div></div>' +
        '<div><div class="gl-t">Risk flag</div><div class="gl-d">High risk: 4+ months AND 30+ disputes. Watch: 2+ months AND 10+ disputes.</div></div>' +
        '<div><div class="gl-t">AI analysis</div><div class="gl-d">Click any row to see AI pattern analysis and suggested fraud rule changes, generated in real time.</div></div>' +
        '</div>';

      render();
    })
    .catch(function(err) {
      document.getElementById("tbl-wrap").innerHTML =
        '<div class="empty"><strong>Failed to load data</strong>' + err.message + '</div>';
    });
}

function getFlag(o){ if(o.n_months>=4&&o.total_cases>=30)return"high"; if(o.n_months>=2&&o.total_cases>=10)return"watch"; return"ok"; }
function getFlagOrd(o){ var f=getFlag(o); return f==="high"?0:f==="watch"?1:2; }
function getMonthsInRange(o,fr,to){ return o.trend.filter(function(t){return(!fr||t.month>=fr)&&(!to||t.month<=to)&&t.cases>0;}).length; }
function getCasesInRange(o,fr,to){ return o.trend.reduce(function(a,t){return(!fr||t.month>=fr)&&(!to||t.month<=to)?a+t.cases:a;},0); }

function setQuick(mode,e){
  document.querySelectorAll(".filters button.fp").forEach(function(b){b.classList.remove("on");});
  if(e) e.target.classList.add("on");
  var n = MONTHS_ALL.length;
  if(mode==="3m"){ document.getElementById("dt-from").value=MONTHS_ALL[Math.max(0,n-3)]||""; document.getElementById("dt-to").value=""; }
  else if(mode==="6m"){ document.getElementById("dt-from").value=MONTHS_ALL[Math.max(0,n-6)]||""; document.getElementById("dt-to").value=""; }
  else{ document.getElementById("dt-from").value=""; document.getElementById("dt-to").value=""; }
  render();
}
function clearQuick(){ document.querySelectorAll(".filters button.fp").forEach(function(b){b.classList.remove("on");}); }

function sort(key){
  if(sortKey===key){sortAsc=!sortAsc;}else{sortKey=key;sortAsc=false;}
  document.querySelectorAll(".th").forEach(function(th){th.classList.remove("sorted","asc");});
  var el=document.getElementById("th-"+key);
  if(el){el.classList.add("sorted");if(sortAsc)el.classList.add("asc");}
  render();
}

function buildRow(o){
  var fr=document.getElementById("dt-from")?document.getElementById("dt-from").value:"";
  var to=document.getElementById("dt-to")?document.getElementById("dt-to").value:"";
  var months=(fr||to)?getMonthsInRange(o,fr,to):o.n_months;
  var cases=(fr||to)?getCasesInRange(o,fr,to):o.total_cases;
  var reason=rl(o.top_reason);
  var pct=o.top_reason_pct;
  var flag=getFlag(o);
  var flagLbl=flag==="high"?"High risk":flag==="watch"?"Watch":"Normal";
  var wrCls=o.win_rate==null?"m":o.win_rate>=50?"r":o.win_rate>=20?"a":"m";
  var mCls=months>=4?"r":months>=2?"a":"td";
  var maxC=Math.max.apply(null,o.trend.map(function(t){return t.cases;}));
  if(maxC<1)maxC=1;
  var avg=cases/Math.max(months,1);
  var bars=o.trend.map(function(t){
    var h=Math.max(Math.round(t.cases/maxC*34),t.cases>0?3:0);
    var isCur=t.month===o.trend[o.trend.length-1].month;
    var isHl=(fr||to)&&(!fr||t.month>=fr)&&(!to||t.month<=to);
    var cls=isHl?"hl":(isCur?"cur":"");
    if(!isHl&&!isCur&&t.cases>avg*1.8&&t.cases>3)cls="spike";
    return "<div class='mbar "+cls+"' style='height:"+h+"px' title='"+t.month+": "+t.cases+"'></div>";
  }).join("");
  var isExp=expandedId===o.org_id;
  var row="<div class='trow"+(isExp?" exp":"")+"' onclick='toggle(this.dataset.id)' data-id='"+escH(o.org_id)+"'>";
  row+="<div><div class='oname' title='"+escH(o.customer)+"'>"+escH(trunc(o.customer,40))+"</div><div class='oid'>org_id: "+escH(o.org_id)+"</div></div>";
  row+="<div><span class='pill "+flag+"'>"+flagLbl+"</span></div>";
  row+="<div class='td "+mCls+"'>"+months+"</div>";
  row+="<div class='td b'>"+cases+"</div>";
  row+="<div class='td "+wrCls+"'>"+fmtP(o.win_rate)+"</div>";
  row+="<div><span class='rtag' title='"+escH(reason)+"'>"+escH(trunc(reason,30))+"</span><span class='pct'>"+pct+"%</span></div>";
  row+="<div style='display:flex;align-items:center;justify-content:flex-end;gap:8px'><div class='mbars'>"+bars+"</div><span class='expand-arrow'>&#8250;</span></div>";
  row+="</div>";
  if(isExp){ row+=buildExpand(o,flag); }
  return row;
}

function buildExpand(o,flag){
  var h="<div class='exp-inner'>";
  // Coluna esquerda
  h+="<div>";
  var maxR=o.top_reasons[0]?o.top_reasons[0].count:1;
  h+="<div class='exp-h'>Dispute reasons</div>";
  o.top_reasons.forEach(function(r){
    var lbl=rl(r.label);var w=Math.round(r.count/maxR*100);var rp=Math.round(r.count/o.total_cases*100);
    h+="<div class='exp-row'><span class='exp-lbl' title='"+escH(lbl)+"'>"+escH(trunc(lbl,28))+"</span><span class='exp-val'>"+r.count+" ("+rp+"%)</span></div>";
    h+="<div class='bar-wrap'><div class='bar-fill' style='width:"+w+"%'></div></div>";
  });
  var maxM=o.top_merchants[0]?o.top_merchants[0].count:1;
  h+="<div class='exp-h' style='margin-top:14px'>Top merchants</div>";
  o.top_merchants.forEach(function(m){
    var w=Math.round(m.count/maxM*100);
    h+="<div class='exp-row'><span class='exp-lbl' title='"+escH(m.label)+"'>"+escH(trunc(m.label,28))+"</span><span class='exp-val'>"+m.count+"</span></div>";
    h+="<div class='bar-wrap'><div class='bar-fill b' style='width:"+w+"%'></div></div>";
  });
  h+="<div class='exp-h' style='margin-top:14px'>Case statuses (tracker)</div>";
  o.statuses.slice(0,5).forEach(function(s){
    h+="<div class='exp-row'><span class='exp-lbl'>"+escH(trunc(s.label,28))+"</span><span class='exp-val'>"+s.count+"</span></div>";
  });
  h+="</div>";
  // Coluna direita — AI
  h+="<div>";
  h+="<div class='exp-h'>AI pattern analysis</div>";
  if(aiCache[o.org_id]){
    var ai=aiCache[o.org_id];
    h+="<div class='ai-box "+flag+"'><div class='ai-label'>Pattern detected</div>"+escH(ai.analysis)+"<div class='ai-rec'><div class='ai-rec-label'>Rule recommendation</div>"+escH(ai.recommendation)+"</div></div>";
  } else {
    h+="<div class='ai-box loading' id='ai-"+escH(o.org_id)+"'>Generating AI analysis...</div>";
    setTimeout(function(){ generateAI(o, flag); }, 50);
  }
  h+="</div>";
  h+="</div>";
  return h;
}

function render(){
  if(!document.getElementById("tbody")) return;
  var q=document.getElementById("q").value.toLowerCase().trim();
  var fr=document.getElementById("dt-from").value;
  var to=document.getElementById("dt-to").value;
  var list=ORGS.slice();
  if(fr||to) list=list.filter(function(o){return o.trend.some(function(t){return(!fr||t.month>=fr)&&(!to||t.month<=to)&&t.cases>0;});});
  if(q) list=list.filter(function(o){return o.customer.toLowerCase().indexOf(q)>=0||o.org_id.indexOf(q)>=0;});
  list.sort(function(a,b){
    var va,vb;
    if(sortKey==="months"){va=(fr||to)?getMonthsInRange(a,fr,to):a.n_months;vb=(fr||to)?getMonthsInRange(b,fr,to):b.n_months;}
    else if(sortKey==="cases"){va=(fr||to)?getCasesInRange(a,fr,to):a.total_cases;vb=(fr||to)?getCasesInRange(b,fr,to):b.total_cases;}
    else if(sortKey==="wr"){va=a.win_rate==null?-1:a.win_rate;vb=b.win_rate==null?-1:b.win_rate;}
    else if(sortKey==="flag"){va=getFlagOrd(a);vb=getFlagOrd(b);}
    else{va=a.suspicion_score;vb=b.suspicion_score;}
    return sortAsc?va-vb:vb-va;
  });
  document.getElementById("rc").textContent=list.length+" orgs";
  var hd=(fr||to)?"Filtered results":"Repetitive dispute patterns";
  document.getElementById("sec-hd").textContent=hd+" — "+list.length+" orgs with 2+ active months";
  var html=list.map(buildRow).join("");
  if(!html) html="<div class='empty'><strong>No results</strong>Try a different search or period.</div>";
  document.getElementById("tbody").innerHTML=html;
}

function toggle(id){ expandedId=expandedId===id?null:id; render(); }

function generateAI(o, flag){
  var reason=rl(o.top_reason);
  var topM=o.top_merchants.slice(0,3).map(function(m){return m.label+" ("+m.count+")";}).join(", ");
  var wrNote=o.win_rate==null?"unknown":o.win_rate+"% (high = card network confirmed fraud)";
  var prompt=
    "You are a fraud analyst at Jeeves, a B2B fintech. Analyse this dispute pattern.\n\n"+
    "Org: "+o.customer+" (id: "+o.org_id+")\n"+
    "Risk: "+flag+"\n"+
    "Months active: "+o.n_months+"\n"+
    "Total disputes: "+o.total_cases+"\n"+
    "Win rate: "+wrNote+"\n"+
    "Top reason: "+reason+" ("+o.top_reason_pct+"% of cases)\n"+
    "Top merchants: "+topM+"\n\n"+
    "Available rule types: MCC blacklist/whitelist, Country blacklist/whitelist, Merchant blacklist/whitelist.\n\n"+
    "Return ONLY valid JSON: {\"analysis\": \"2-3 sentences on why suspicious\", \"recommendation\": \"1-2 sentences on rule changes\"}";

  fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:350,messages:[{role:"user",content:prompt}]})
  }).then(function(r){return r.json();})
  .then(function(d){
    var text=(d.content&&d.content[0])?d.content[0].text:"";
    try{
      var p=JSON.parse(text.replace(/```json|```/g,"").trim());
      aiCache[o.org_id]=p;
      var el=document.getElementById("ai-"+o.org_id);
      if(el&&p){
        el.className="ai-box "+flag;
        el.innerHTML="<div class='ai-label'>Pattern detected</div>"+escH(p.analysis||"")+"<div class='ai-rec'><div class='ai-rec-label'>Rule recommendation</div>"+escH(p.recommendation||"")+"</div>";
      }
    }catch(e){
      var el=document.getElementById("ai-"+o.org_id);
      if(el) el.textContent="Analysis unavailable.";
    }
  }).catch(function(){
    var el=document.getElementById("ai-"+o.org_id);
    if(el) el.textContent="Analysis unavailable (CORS — works on GitHub Pages, not locally).";
  });
}

loadData();
